<section id="formacao" class="section-seam py-24 px-6 bg-white dark:bg-[#0f172a]">
  <div class="max-w-3xl mx-auto">
    <h2
      appTitleReveal
      class="section-title w-fit mx-auto mb-12 text-3xl md:text-4xl font-extrabold tracking-tight bg-linear-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent"
      i18n="@@education.title"
    >
      Formação Acadêmica
    </h2>

    <app-timeline
      [items]="education"
      [icon]="GraduationCapIcon"
      [dateOngoingLabel]="currentLabel"
      [ongoingBadgeLabel]="inProgressLabel"
      [completedBadgeLabel]="completedLabel"
    />
  </div>
</section>
